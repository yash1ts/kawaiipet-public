<?xml version="1.0" encoding="UTF-8"?>
<!--
  Ghost silhouette from Lucide (lucide-static v0.468.0, ISC License).
  Recolored / styled for KawaiiPet blue slime theme (matches res/values/colors.xml).
-->
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 24 24" fill="none">
  <defs>
    <radialGradient id="slimeCore" cx="38%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#E8F4FC"/>
      <stop offset="35%" stop-color="#B3E5FC"/>
      <stop offset="65%" stop-color="#29B6F6"/>
      <stop offset="100%" stop-color="#0288D1"/>
    </radialGradient>
    <linearGradient id="slimeShade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64B5F6" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#01579B" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#01579B" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- Body: Lucide ghost outline, filled -->
  <path
    fill="url(#slimeCore)"
    stroke="#01579B"
    stroke-width="0.55"
    stroke-linejoin="round"
    d="M12 2a8 8 0 0 0-8 8v12l3-3 2.5 2.5L12 19l2.5 2.5L17 19l3 3V10a8 8 0 0 0-8-8z"
  />
  <!-- Depth / seafoam tint -->
  <path
    fill="url(#slimeShade)"
    d="M12 2a8 8 0 0 0-8 8v12l3-3 2.5 2.5L12 19l2.5 2.5L17 19l3 3V10a8 8 0 0 0-8-8z"
  />
  <!-- Specular highlight (slime gloss) -->
  <ellipse cx="9.2" cy="7.8" rx="3.6" ry="2.9" fill="#FFFFFF" fill-opacity="0.55"/>
  <ellipse cx="8.5" cy="8.1" rx="1.6" ry="1.1" fill="#FFFFFF" fill-opacity="0.35"/>

  <!-- Cheek blush (matches slime_happy tone) -->
  <circle cx="6.4" cy="12.2" r="1.35" fill="#F48FB1" fill-opacity="0.55"/>
  <circle cx="17.6" cy="12.2" r="1.35" fill="#F48FB1" fill-opacity="0.55"/>

  <!-- Eyes -->
  <circle cx="9" cy="10" r="1.05" fill="#0D47A1"/>
  <circle cx="15" cy="10" r="1.05" fill="#0D47A1"/>
  <circle cx="8.55" cy="9.65" r="0.35" fill="#FFFFFF" fill-opacity="0.9"/>
  <circle cx="14.55" cy="9.65" r="0.35" fill="#FFFFFF" fill-opacity="0.9"/>

  <!-- Tiny smile -->
  <path
    d="M10.2 13.6 Q12 15 13.8 13.6"
    fill="none"
    stroke="#0D47A1"
    stroke-width="0.65"
    stroke-linecap="round"
  />
</svg>
